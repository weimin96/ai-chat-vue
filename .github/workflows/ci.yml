name: CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - package-lock.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - play/**
      - docs/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - package-lock.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - play/**
      - docs/**

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check build configs
        run: npx tsc -p tsconfig.vite-config.json --noEmit

      - name: Build library
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      - name: Build play app
        run: npm run play:build
