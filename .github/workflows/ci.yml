name: CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - package-lock.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - play/**
      - docs/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - package-lock.json
      - tsconfig*.json
      - vite.config.ts
      - src/**
      - play/**
      - docs/**

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test / ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 20
          - 22

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Type check build configs
        run: npx tsc -p tsconfig.vite-config.json --noEmit

      - name: Build library
        run: npm run build

      - name: Check bundle size
        run: npm run size

      - name: Build docs
        run: npm run docs:build

      - name: Build play app
        run: npm run play:build
